{{define "components/import-outbound-form.html"}}
<form hx-post="/api/outbounds/import" hx-target="#outbounds-table" hx-swap="outerHTML" 
      onsubmit="closeModal(); setTimeout(lucide.createIcons, 100);">
    <div class="form-group">
        <label class="form-label">分享链接</label>
        <textarea name="link" class="form-control" rows="5" placeholder="仅支持一行链接输入，支持 vmess://, vless://, trojan://..."></textarea>
        <small style="color: var(--text-secondary); margin-top: 0.5rem; display: block;">
            支持 vmess://、vless://、trojan:// 等格式，每次导入单条链接。
        </small>
    </div>
    
    <div class="form-actions" style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
        <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">导入</button>
    </div>
</form>
{{end}}
