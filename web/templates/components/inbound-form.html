{{define "components/inbound-form.html"}}
<form hx-post="/api/inbounds{{if .Inbound}}/{{.Inbound.ID}}{{end}}" hx-target="#inbounds-table" hx-swap="innerHTML" id="inbound-form">

    <div class="form-group">
        <label for="tag">标签</label>
        <input type="text" id="tag" name="tag" value="{{if .Inbound}}{{.Inbound.Tag}}{{end}}" required>
    </div>

    <div class="form-group">
        <label for="protocol">协议</label>
        <select id="protocol" name="protocol" required>
            <option value="vless" {{if and .Inbound (eq .Inbound.Protocol "vless")}}selected{{end}}>VLESS</option>
            <option value="trojan" {{if and .Inbound (eq .Inbound.Protocol "trojan")}}selected{{end}}>Trojan</option>
        </select>
        <small class="form-hint">入站协议类型</small>
    </div>

    <div class="form-group">
        <label for="use_uds">Unix Domain Socket (UDS)</label>
        <select id="use_uds" name="use_uds" required onchange="toggleUDSFields(this.value)">
            <option value="true" {{if or (not .Inbound) .Inbound.UseUDS}}selected{{end}}>⚡ 启用 (更高性能, 无需本地端口)</option>
            <option value="false" {{if and .Inbound (not .Inbound.UseUDS)}}selected{{end}}>🌐 禁用 (使用 TCP 端口)</option>
        </select>
        <small class="form-hint">直接通过内存套接字进行 Nginx 反代，极大降低 TCP 开销</small>
    </div>

    <div class="form-group" id="port-fields" style="display: {{if or (not .Inbound) .Inbound.UseUDS}}none{{else}}block{{end}};">
        <label for="port">TCP 端口</label>
        <div class="input-with-button">
            <input type="number" id="port" name="port" value="{{if .Inbound}}{{.Inbound.Port}}{{end}}"
                min="1024" max="65535" placeholder="留空自动生成">
            <button type="button" class="btn btn-sm" onclick="generateRandomPort()">🎲 随机</button>
        </div>
        <input type="hidden" id="random_port" name="random_port" value="false">
        <small class="form-hint">Xray 监听端口（留空或点击随机自动生成 10000-60000 之间的端口）</small>
    </div>

    <div class="form-group">
        <label for="transport">传输协议</label>
        <select id="transport" name="transport" required onchange="toggleTransportFields(this.value)">
            <option value="xhttp" {{if and .Inbound (eq .Inbound.Transport "xhttp")}}selected{{end}}>XHTTP (推荐)</option>
            <option value="grpc" {{if and .Inbound (eq .Inbound.Transport "grpc")}}selected{{end}}>gRPC</option>
            <option value="ws" {{if and .Inbound (eq .Inbound.Transport "ws")}}selected{{end}}>WebSocket</option>
        </select>
        <small class="form-hint">传输层协议（均可被 Nginx 反代）</small>
    </div>

    <!-- WebSocket / XHTTP Fields -->
    <div id="ws-xhttp-fields" style="display: {{if or (not .Inbound) (eq .Inbound.Transport "ws") (eq .Inbound.Transport "xhttp")}}block{{else}}none{{end}};">
        <div class="form-group">
            <label for="path">路径</label>
            <div class="input-with-button">
                <input type="text" id="path" name="path" value="{{if .Inbound}}{{.Inbound.Path}}{{end}}"
                    placeholder="留空自动生成随机路径">
                <button type="button" class="btn btn-sm" onclick="generateRandomPath()">🎲 随机</button>
            </div>
            <input type="hidden" id="random_path" name="random_path" value="false">
            <small class="form-hint">WebSocket/XHTTP 路径（留空或点击随机自动生成）</small>
        </div>
        <div class="form-group">
            <label for="host">Host (可选)</label>
            <input type="text" id="host" name="host" value="{{if .Inbound}}{{.Inbound.Host}}{{end}}"
                placeholder="example.com">
            <small class="form-hint">Host 头，通常留空</small>
        </div>
    </div>

    <!-- gRPC Fields -->
    <div id="grpc-fields" style="display: {{if and .Inbound (eq .Inbound.Transport "grpc")}}block{{else}}none{{end}};">
        <div class="form-group">
            <label for="service_name">服务名</label>
            <input type="text" id="service_name" name="service_name" value="{{if .Inbound}}{{.Inbound.ServiceName}}{{end}}"
                placeholder="grpc-service">
            <small class="form-hint">gRPC 服务名称</small>
        </div>
    </div>

    <div class="form-group">
        <label for="domain_id">SNI 域名</label>
        <select id="domain_id" name="domain_id">
            <option value="">无</option>
            {{range .Domains}}
            <option value="{{.ID}}" {{if and $.Inbound (eq $.Inbound.DomainID .ID)}}selected{{end}}>
                {{.Domain}}
            </option>
            {{end}}
        </select>
        <small class="form-hint">关联域名（用于 SNI 和 Nginx 证书）</small>
    </div>

    <div class="form-group">
        <label for="connect_domain">连接目标域名 (可选)</label>
        <input type="text" id="connect_domain" name="connect_domain"
            value="{{if .Inbound}}{{.Inbound.ConnectDomain}}{{end}}"
            placeholder="cdn.example.com 或 example.com">
        <small class="form-hint">客户端实际连接的域名（CDN域名或父域名），留空则使用 SNI 域名</small>
    </div>

    <div class="form-group">
        <label for="remark">备注</label>
        <textarea id="remark" name="remark" rows="2">{{if .Inbound}}{{.Inbound.Remark}}{{end}}</textarea>
    </div>

    <div class="form-actions">
        <button type="button" onclick="closeModal()" class="btn">取消</button>
        <button type="submit" class="btn btn-primary">
            {{if .Inbound}}更新{{else}}创建{{end}}
        </button>
    </div>
</form>

<script>
    function toggleTransportFields(transport) {
        const wsXhttpFields = document.getElementById('ws-xhttp-fields');
        const grpcFields = document.getElementById('grpc-fields');
        
        if (transport === 'grpc') {
            wsXhttpFields.style.display = 'none';
            grpcFields.style.display = 'block';
        } else {
            wsXhttpFields.style.display = 'block';
            grpcFields.style.display = 'none';
        }
    }

    function toggleUDSFields(useUDS) {
        const portFields = document.getElementById('port-fields');
        if (useUDS === 'true') {
            portFields.style.display = 'none';
        } else {
            portFields.style.display = 'block';
        }
    }

    function generateRandomPort() {
        // 生成 10000-60000 之间的随机端口
        const port = Math.floor(Math.random() * 50000) + 10000;
        document.getElementById('port').value = port;
        document.getElementById('random_port').value = 'false'; // 已经在前端生成了
    }

    function generateRandomPath() {
        // 生成 16 位随机十六进制字符串作为路径
        const bytes = new Uint8Array(8);
        crypto.getRandomValues(bytes);
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        document.getElementById('path').value = '/' + hex;
        document.getElementById('random_path').value = 'false'; // 已经在前端生成了
    }
</script>

<style>
    .input-with-button {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    .input-with-button input {
        flex: 1;
    }
    .btn-sm {
        padding: 4px 8px;
        font-size: 12px;
        white-space: nowrap;
    }
</style>
{{end}}
