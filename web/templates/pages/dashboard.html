{{define "dashboard"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Xray 面板</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/lucide.min.js"></script>
</head>
<body>
    {{template "nav" .}}
    <div class="content">
        <div class="content-page">
            <div class="page-header"><h1>仪表盘</h1></div>
            <div class="stats-grid"
                 hx-get="/api/dashboard/stats"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML"
                 hx-on::after-settle="lucide.createIcons(document.querySelector('.stats-grid'))">
                <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">加载中...</div></div>
            </div>
        </div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>
    <div id="notifications"></div>
    <script src="/static/js/app.min.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
{{end}}
