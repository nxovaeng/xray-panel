{{define "settings"}}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用配置 - Xray 面板</title>
    <link rel="stylesheet" href="/static/css/style.css">
        <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/lucide.min.js"></script>
</head>

<body>
    {{template "nav" .}}

    <main class="content">
        <div class="content-page">
            <div class="page-header">
                <h1>🔄 应用配置</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card" id="xray-status-card">
                    <div class="stat-icon">
                        <i data-lucide="activity"></i>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="xray-status-text">检测中...</div>
                        <div class="stat-label">Xray 服务状态</div>
                    </div>
                </div>
            </div>

            <div class="settings-grid"
                style="display: grid; gap: 2rem; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));">

                <!-- Panel Settings -->
                <div class="table-container" style="padding: 2rem;">
                    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <i data-lucide="settings"></i> 面板配置
                    </h2>

                    <div class="form-group">
                        <label>面板模式</label>
                        <select id="panel-mode" class="form-control" style="max-width: 200px;">
                            <option value="server" {{if eq .PanelMode "server" }}selected{{end}}>Server (服务端)</option>
                            <option value="client" {{if eq .PanelMode "client" }}selected{{end}}>Client (客户端)</option>
                        </select>
                        <p class="help-text" style="font-size: 0.857rem; color: var(--text-muted); margin-top: 0.5rem;">
                            切换模式后需要保存并应用配置才能完整生效。</p>
                    </div>

                    <button class="btn btn-primary" onclick="savePanelMode()" id="btn-save-mode">
                        <i data-lucide="save"></i> 保存面板配置
                    </button>
                </div>

                <!-- Service Control -->
                <div class="table-container" style="padding: 2rem;">
                    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <i data-lucide="server"></i> 服务控制
                    </h2>

                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="restartXray()" id="btn-restart-xray">
                            <i data-lucide="refresh-cw"></i> 重启 Xray
                        </button>

                        <button class="btn btn-warning" onclick="applyConfig()" id="btn-apply-config">
                            <i data-lucide="save"></i> 应用配置 & 重启服务
                        </button>
                    </div>

                    <div id="service-output" class="hidden"
                        style="margin-top: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.3); border-radius: 0.5rem; font-family: monospace;">
                        <!-- Output log -->
                    </div>
                </div>

            </div>

            <!-- Config Preview -->
            <div class="table-container" style="padding: 2rem; margin-top: 2rem;">
                <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="file-code"></i> 配置文件预览
                </h2>

                <div style="margin-bottom: 1rem;">
                    <button class="btn btn-outline btn-sm" onclick="previewConfig('xray')">Xray 配置</button>
                </div>

                <pre id="config-preview"
                    style="max-height: 500px; overflow-y: auto; padding: 1rem; white-space: pre-wrap;">点击按钮加载预览...</pre>
            </div>

        </div>
    </main>

    <div id="notification-container"></div>
    <script src="/static/js/app.min.js"></script>
    <script>
        if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});

        // Check status on load (public API, no auth required)
        fetch('/api/xray/status')
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById('xray-status-text');
                if (data.success && data.data.active) {
                    el.innerText = "运行中";
                    el.style.color = "var(--success)";
                } else if (data.success) {
                    el.innerText = "已停止";
                    el.style.color = "var(--danger)";
                } else {
                    el.innerText = "检测失败";
                    el.style.color = "var(--warning)";
                }
            })
            .catch(err => {
                const el = document.getElementById('xray-status-text');
                el.innerText = "检测失败";
                el.style.color = "var(--warning)";
            });

        function savePanelMode() {
            const btn = document.getElementById('btn-save-mode');
            const mode = document.getElementById('panel-mode').value;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 保存中...';
            btn.disabled = true;
            if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});

            fetch('/api/settings', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    panel_mode: mode
                }),
                credentials: 'same-origin'
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showNotification('success', '模式已保存，正在刷新...');
                        setTimeout(() => {
                            window.location.reload();
                        }, 1000);
                    } else {
                        showNotification('error', '保存失败: ' + data.error);
                    }
                })
                .catch(err => showNotification('error', '请求失败'))
                .finally(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});
                });
        }

        function restartXray() {
            const btn = document.getElementById('btn-restart-xray');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 重启中...';
            btn.disabled = true;
            if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});

            fetch('/api/xray/restart', {
                method: 'POST',
                credentials: 'same-origin'
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showNotification('success', 'Xray 服务已重启');
                    } else {
                        showNotification('error', '重启失败: ' + data.error);
                    }
                })
                .catch(err => showNotification('error', '请求失败'))
                .finally(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});
                });
        }

        function applyConfig() {
            const btn = document.getElementById('btn-apply-config');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 应用中...';
            btn.disabled = true;
            if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});

            fetch('/api/xray/apply', {
                method: 'POST',
                credentials: 'same-origin'
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showNotification('success', '配置已应用，服务已重启');
                    } else {
                        showNotification('error', '应用失败: ' + data.error);
                    }
                })
                .catch(err => showNotification('error', '请求失败'))
                .finally(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    if(window.lucide) lucide.createIcons({nameAttr:"data-lucide",attrs:{},nodes:[document.getElementById("btn-restart-xray"),document.getElementById("btn-apply-config"),document.getElementById("btn-save-mode")].filter(Boolean)});
                });
        }

        function previewConfig(type) {
            const pre = document.getElementById('config-preview');
            pre.innerText = "加载中...";

            fetch('/api/xray/config', {
                credentials: 'same-origin'
            })
                .then(res => res.text())
                .then(text => {
                    // Formatting JSON
                    try {
                        const json = JSON.parse(text);
                        pre.innerText = JSON.stringify(json, null, 2);
                    } catch (e) {
                        pre.innerText = text;
                    }
                })
                .catch(err => {
                    pre.innerText = "加载失败: " + err;
                });
        }
    </script>
</body>

</html>
{{end}}
